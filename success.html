<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download Your Ebook — Forgelab Reads</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0b; --bg2: #111114; --bg3: #1a1a1f;
      --border: #2a2a30; --gold: #c9a84c; --gold2: #e8c97a;
      --white: #f0ede8; --muted: #8a8890;
    }
    body { background: var(--bg); color: var(--white); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    .card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 20px; padding: 56px 48px; max-width: 520px; width: 100%; text-align: center;
    }
    .icon { font-size: 56px; margin-bottom: 24px; }
    .logo { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--gold); margin-bottom: 40px; }
    h1 { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; margin-bottom: 16px; }
    p { color: var(--muted); font-size: 15px; line-height: 1.7; margin-bottom: 32px; }
    .download-btn {
      display: inline-flex; align-items: center; gap: 10px;
      background: var(--gold); color: #000;
      padding: 16px 36px; border-radius: 10px;
      font-size: 16px; font-weight: 700; font-family: inherit;
      border: none; cursor: pointer; text-decoration: none;
      transition: background 0.2s, transform 0.15s;
      box-shadow: 0 4px 24px rgba(201,168,76,0.25);
      margin-bottom: 24px;
    }
    .download-btn:hover { background: var(--gold2); transform: translateY(-2px); }
    .download-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .note { font-size: 13px; color: var(--muted); }
    .back { display: block; margin-top: 32px; font-size: 14px; color: var(--muted); transition: color 0.2s; }
    .back:hover { color: var(--white); }
    .loading { color: var(--muted); font-size: 14px; }
    .error { color: #e05252; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Forgelab Reads</div>
    <div id="content">
      <div class="loading">Verifying your purchase...</div>
    </div>
  </div>

  <script>
    const API_BASE = 'https://base44.app/api/apps/69b1a81e925be2e15bb4b901';

    async function verifyAndShow() {
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get('session_id');
      const token = params.get('token');
      const content = document.getElementById('content');

      if (token) {
        // Direct download link
        content.innerHTML = `
          <div class="icon">✅</div>
          <h1>Your book is ready</h1>
          <p>Thank you for your purchase. Click below to download your PDF instantly.</p>
          <a class="download-btn" href="${API_BASE}/functions/download?token=${token}" download>⬇ Download PDF</a>
          <div class="note">Check your email — we also sent a download link there.</div>
          <a class="back" href="/">← Back to Forgelab Reads</a>`;
        return;
      }

      if (!sessionId) {
        content.innerHTML = `<div class="error">No session found. <a href="/" style="color:var(--gold)">Go back to the shop</a></div>`;
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/functions/verify-order`, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ session_id: sessionId })
        });
        const data = await res.json();

        if (data.download_url) {
          content.innerHTML = `
            <div class="icon">✅</div>
            <h1>Your book is ready</h1>
            <p>Thank you for your purchase of <strong style="color:var(--white)">${data.ebook_title||'your ebook'}</strong>. Click below to download your PDF instantly.</p>
            <a class="download-btn" href="${data.download_url}" download>⬇ Download PDF</a>
            <div class="note">A download link has also been sent to <strong style="color:var(--white)">${data.email||'your email'}</strong>.</div>
            <a class="back" href="/">← Browse more books</a>`;
        } else {
          content.innerHTML = `
            <div class="icon">⏳</div>
            <h1>Payment processing</h1>
            <p>Your payment is being processed. Check your email in a few minutes for the download link.</p>
            <a class="back" href="/">← Back to Forgelab Reads</a>`;
        }
      } catch(e) {
        content.innerHTML = `
          <div class="icon">✅</div>
          <h1>Thank you!</h1>
          <p>Your payment was received. Check your email for the download link within a few minutes.</p>
          <a class="back" href="/">← Back to Forgelab Reads</a>`;
      }
    }

    verifyAndShow();
  </script>
</body>
</html>
